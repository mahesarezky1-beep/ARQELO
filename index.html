<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ARQELO</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-1: #07111f;
            --bg-2: #0b1730;
            --bg-3: #111f3d;
            --text-main: #e7eefc;
            --text-soft: #9fb1d1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }

        body {
            min-height: 100dvh;
            font-family: 'Poppins', sans-serif;
            color: var(--text-main);
            overflow-x: hidden;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 16px;
            background:
                radial-gradient(circle at top, rgba(74, 214, 255, 0.12), transparent 28%),
                radial-gradient(circle at 80% 30%, rgba(107, 125, 255, 0.10), transparent 25%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2) 50%, var(--bg-3));
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                linear-gradient(to bottom, rgba(255,255,255,0.03), transparent 25%),
                radial-gradient(circle at center, rgba(255,255,255,0.04), transparent 55%);
            pointer-events: none;
        }

        .container {
            position: relative;
            width: min(100%, 560px);
            padding: clamp(20px, 5vw, 40px);
            border-radius: 28px;
            background: rgba(8, 15, 30, 0.34);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow:
                0 18px 60px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            overflow: hidden;
        }

        .logo {
            display: block;
            margin: 0 auto 14px;
            width: clamp(48px, 12vw, 110px);
            max-width: 100%;
            max-height: 110px;
            height: auto;
            object-fit: contain;
            filter:
                drop-shadow(0 0 10px rgba(74, 214, 255, 0.20))
                drop-shadow(0 0 18px rgba(107, 125, 255, 0.12));
            animation: float 4s ease-in-out infinite;
        }

        .line {
            width: min(120px, 35vw);
            height: 1px;
            margin: clamp(14px, 3vw, 22px) auto clamp(12px, 3vw, 18px);
            background: linear-gradient(90deg, transparent, rgba(231, 238, 252, 0.9), transparent);
            opacity: 0.85;
        }

        .subtitle {
            font-size: clamp(13px, 2.6vw, 15px);
            font-weight: 600;
            letter-spacing: clamp(3px, 1vw, 6px);
            color: var(--text-main);
            text-transform: uppercase;
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .text {
            font-size: clamp(12px, 2.8vw, 14px);
            font-weight: 300;
            color: var(--text-soft);
            letter-spacing: 0.4px;
            line-height: 1.6;
        }

        .glow {
            position: absolute;
            left: 50%;
            bottom: -90px;
            width: clamp(160px, 40vw, 240px);
            height: clamp(160px, 40vw, 240px);
            transform: translateX(-50%);
            background: radial-gradient(circle, rgba(74, 214, 255, 0.18), transparent 65%);
            filter: blur(14px);
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        @media (max-width: 768px) {
            .logo {
                width: clamp(44px, 10vw, 86px);
                max-height: 86px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .container {
                border-radius: 22px;
                padding: 18px 14px;
            }

            .logo {
                width: 56px;
                max-height: 56px;
                margin-bottom: 12px;
            }

            .subtitle {
                letter-spacing: 2.5px;
            }

            .text {
                font-size: 12px;
            }
        }

        @media (max-width: 360px) {
            .logo {
                width: 48px;
                max-height: 48px;
            }

            .subtitle {
                font-size: 12px;
                letter-spacing: 2px;
            }

            .text {
                font-size: 11px;
            }
        }

        @media (max-height: 700px) {
            body {
                align-items: flex-start;
                padding-top: 24px;
                padding-bottom: 24px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glow"></div>

        <img src="logo.png" alt="ARQELO Logo" class="logo">

        <div class="line"></div>

        <p class="subtitle">COMING SOON</p>
        <p class="text">Stay tuned for something special</p>
    </div>

</body>
</html>
