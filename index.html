<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARQELO</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-1: #07111f;
            --bg-2: #0b1730;
            --bg-3: #111f3d;
            --text-main: #e7eefc;
            --text-soft: #9fb1d1;
            --accent-1: #4ad6ff;
            --accent-2: #6b7dff;
            --accent-3: #8a5cff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Poppins', sans-serif;
            color: var(--text-main);
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            background:
                radial-gradient(circle at top, rgba(74, 214, 255, 0.12), transparent 28%),
                radial-gradient(circle at 80% 30%, rgba(107, 125, 255, 0.10), transparent 25%),
                linear-gradient(135deg, var(--bg-1), var(--bg-2) 50%, var(--bg-3));
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background:
                linear-gradient(to bottom, rgba(255,255,255,0.03), transparent 25%),
                radial-gradient(circle at center, rgba(255,255,255,0.04), transparent 55%);
            pointer-events: none;
        }

        .container {
            position: relative;
            padding: 38px 28px 34px;
            width: min(520px, calc(100vw - 32px));
            border-radius: 28px;
            background: rgba(8, 15, 30, 0.34);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow:
                0 18px 60px rgba(0, 0, 0, 0.35),
                inset 0 1px 0 rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(14px);
        }

        .logo {
            width: 190px;
            max-width: 70vw;
            display: block;
            margin: 0 auto 18px;
            filter:
                drop-shadow(0 0 10px rgba(74, 214, 255, 0.20))
                drop-shadow(0 0 18px rgba(107, 125, 255, 0.12));
            animation: float 4s ease-in-out infinite;
        }

        .line {
            width: 120px;
            height: 1px;
            margin: 22px auto 18px;
            background: linear-gradient(90deg, transparent, rgba(231, 238, 252, 0.9), transparent);
            opacity: 0.85;
        }

        .subtitle {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 6px;
            color: var(--text-main);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        .text {
            font-size: 14px;
            font-weight: 300;
            color: var(--text-soft);
            letter-spacing: 0.4px;
        }

        .glow {
            position: absolute;
            inset: auto 50% -80px auto;
            width: 220px;
            height: 220px;
            transform: translateX(50%);
            background: radial-gradient(circle, rgba(74, 214, 255, 0.18), transparent 65%);
            filter: blur(14px);
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        @media (max-width: 480px) {
            .container {
                padding: 30px 20px 28px;
                border-radius: 24px;
            }

            .logo {
                width: 160px;
            }

            .subtitle {
                font-size: 13px;
                letter-spacing: 4px;
            }

            .text {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glow"></div>

        <img src="logo.png" alt="ARQELO Logo">

        <div class="line"></div>

        <p class="subtitle">COMING SOON</p>
        <p class="text">Stay tuned for something special</p>
    </div>

</body>
</html>
